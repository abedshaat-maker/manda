services:
  - type: web
    name: manda-london-accounting
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: manda-london-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CH_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: manda-london-db
    databaseName: manda_london
    user: manda_london
    region: frankfurt
    plan: starter
