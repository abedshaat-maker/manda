kind = "web"
previewPath = "/"
title = "Accounting Deadline Manager"
version = "1.0.0"
id = "artifacts/accounting-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24880

[services.development]
run = "pnpm --filter @workspace/accounting-dashboard run dev"

[services.production]
publicDir = "artifacts/accounting-dashboard/dist/empty"
serve = "static"

[services.env]
PORT = "24880"
BASE_PATH = "/"
