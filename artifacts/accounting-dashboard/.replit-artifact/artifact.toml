kind = "web"
previewPath = "/"
title = "Accounting Deadline Manager"
version = "1.0.0"
id = "artifacts/accounting-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24880

[services.development]
run = "pnpm --filter @workspace/accounting-dashboard run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]
run = ["pnpm", "--filter", "@workspace/api-server", "run", "start"]

[services.production.env]
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"

[services.env]
BASE_PATH = "/"
